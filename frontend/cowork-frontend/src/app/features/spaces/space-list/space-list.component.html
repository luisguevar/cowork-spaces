<div class="header">
    <h2>Ambientes</h2>
    <a mat-raised-button color="primary" routerLink="/spaces/new">
        <mat-icon>add</mat-icon> Nuevo Ambiente
    </a>
</div>

<div *ngIf="loading" class="loading">
    <mat-spinner diameter="40" />
</div>

<div *ngIf="error" class="error-message">{{ error }}</div>

<div class="table-scroll" *ngIf="!loading">
    <mat-table [dataSource]="dataSource" class="mat-elevation-z2 spaces-table">

        <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef>Nombre</mat-header-cell>
            <mat-cell *matCellDef="let s">{{ s.name }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="capacity">
            <mat-header-cell *matHeaderCellDef>Capacidad</mat-header-cell>
            <mat-cell *matCellDef="let s">{{ s.capacity }} personas</mat-cell>
        </ng-container>

        <ng-container matColumnDef="hourlyRate">
            <mat-header-cell *matHeaderCellDef>Tarifa por hora</mat-header-cell>
            <mat-cell *matCellDef="let s">{{ s.hourlyRate | currency:'PEN ':'symbol' }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="hours">
            <mat-header-cell *matHeaderCellDef>Horario</mat-header-cell>
            <mat-cell *matCellDef="let s">{{ s.openingTime }} - {{ s.closingTime }}</mat-cell>
        </ng-container>

        <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef>Estado</mat-header-cell>
            <mat-cell *matCellDef="let s">
                <!--   <mat-chip [class]="s.status === 'active' ? 'chip-active' : 'chip-maintenance'">
                    {{getStatusName(s.status)}}
                </mat-chip>
 -->
                <div class="legend">

                    <span class="legend-item">
                        <span [class]="getStatusClass(s.status)"></span> {{getStatusName(s.status)}}
                    </span>
                </div>
            </mat-cell>
        </ng-container>

        <ng-container matColumnDef="actions">
            <mat-header-cell *matHeaderCellDef>Acciones</mat-header-cell>
            <mat-cell *matCellDef="let s">
                <a [routerLink]="authService.isLoggedIn() ? ['/spaces', s.id, 'edit'] : null"
                    [class.action-icon--disabled]="!authService.isLoggedIn()" class="action-icon action-icon--primary"
                    mat-icon-button aria-label="Editar ambiente" title="Editar ambiente">
                    <mat-icon>edit</mat-icon>
                </a>
                <button [disabled]="!authService.isLoggedIn()" [class.action-icon--disabled]="!authService.isLoggedIn()"
                    class="action-icon action-icon--danger" mat-icon-button color="warn"
                    aria-label="Desactivar ambiente" title="Desactivar ambiente" *ngIf="s.status === 'active'"
                    (click)="deactivate(s.id)">
                    <mat-icon>block</mat-icon>
                </button>

                <a [routerLink]="authService.isLoggedIn() ? ['/spaces', s.id, 'availability'] : null"
                    [class.action-icon--disabled]="!authService.isLoggedIn()" class="action-icon action-icon--success"
                    mat-icon-button aria-label="Ver disponibilidad" title="Ver disponibilidad">
                    <mat-icon>schedule</mat-icon>
                </a>
            </mat-cell>
        </ng-container>

        <mat-header-row *matHeaderRowDef="columns" />
        <mat-row *matRowDef="let row; columns: columns;" />
    </mat-table>
</div>

<mat-paginator *ngIf="!loading && dataSource.data.length" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons aria-label="Paginacion de ambientes">
</mat-paginator>
