services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cowork-sqlserver
    environment:
      SA_PASSWORD: "CoWork@2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./db/init:/docker-entrypoint-initdb.d
    entrypoint: >
      /bin/bash -c "
      /opt/mssql/bin/sqlservr &
      sleep 20 &&
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CoWork@2026!' -C -i /docker-entrypoint-initdb.d/001_init.sql &&
      echo 'Database initialized' &&
      wait"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "CoWork@2026!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cowork-backend
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5209"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CoWorkSpaces;User Id=sa;Password=CoWork@2026!;TrustServerCertificate=True;"
    ports:
      - "5209:5209"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/cowork-frontend
      dockerfile: Dockerfile
    container_name: cowork-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  sqlserver-data: